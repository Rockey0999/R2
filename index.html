<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCKEY's Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --phy: #3b82f6; --chem: #10b981; --math: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; }
        
        /* Theme Overhaul */
        .panel { background: var(--panel); border: 1px solid #21262d; border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        /* Left Sidebar: Profile & Timer */
        .profile-card { text-align: center; margin-bottom: 20px; }
        .pfp { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); padding: 5px; cursor: pointer; }
        
        .stopwatch { font-family: 'Courier New', monospace; font-size: 2.5rem; text-align: center; color: var(--accent); text-shadow: 0 0 10px var(--accent); margin: 10px 0; }
        
        /* Middle: Graphs & Planning */
        .center-grid { display: flex; flex-direction: column; gap: 20px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Weekly Columns (Tag System) */
        .week-scroll { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-box { background: var(--glass); border: 1px solid #30363d; border-radius: 12px; padding: 10px; min-height: 180px; }
        .tag { background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 5px; font-size: 11px; margin-bottom: 5px; display: block; border: 1px solid var(--accent); }

        /* Right Sidebar: Exams & Logs */
        .exam-item { background: #161b22; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--math); }
        .log-entry { font-size: 12px; padding: 8px 0; border-bottom: 1px solid #30363d; }

        /* Input Styles */
        input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn-stop { background: #f43f5e; color: white; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="center-grid">
        <div class="panel profile-card">
            <img id="userPfp" src="https://via.placeholder.com/120" class="pfp" onclick="document.getElementById('pfpInput').click()">
            <input type="file" id="pfpInput" hidden onchange="loadImg(event)">
            <h3>IIT Aspirant</h3>
            <div class="stopwatch" id="swDisplay">00:00:00</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="startSW()">Start</button>
                <button class="btn-stop" onclick="stopSW()">Stop</button>
                <button onclick="resetSW()" style="background:#30363d; color:white;">Reset</button>
            </div>
        </div>

        <div class="panel">
            <h2>📈 Mock Score Trend</h2>
            <canvas id="scoreChart" height="150"></canvas>
            <input type="number" id="mockScore" placeholder="Enter Score (out of 300)">
            <button onclick="addScore()">Update Graph</button>
        </div>
    </div>

    <div class="center-grid">
        <div class="panel chart-row">
            <div>
                <h2>📊 Syllabus PCM</h2>
                <canvas id="pcmChart"></canvas>
            </div>
            <div>
                <h2>🕒 Recent Study sessions</h2>
                <canvas id="sessionChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <h2>📅 Weekly Planner (Tags)</h2>
            <div class="week-scroll" id="weekContainer"></div>
        </div>

        <div class="panel">
            <div style="display: flex; gap: 10px;">
                <select id="subSelect"><option>Physics</option><option>Chemistry</option><option>Math</option></select>
                <input type="number" id="hrInput" placeholder="Hours">
                <button onclick="logSession()">Log Work</button>
            </div>
        </div>
    </div>

    <div class="center-grid">
        <div class="panel">
            <h2>⏳ Exam Countdown</h2>
            <input type="text" id="exName" placeholder="Exam Name">
            <input type="date" id="exDate">
            <button onclick="addExam()">Add Deadline</button>
            <div id="examList"></div>
        </div>

        <div class="panel">
            <h2>📝 Activity Log</h2>
            <div id="logList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

</div>

<script>
    // Data Storage
    let studyData = JSON.parse(localStorage.getItem('q_data')) || { Physics: 0, Chemistry: 0, Math: 0 };
    let exams = JSON.parse(localStorage.getItem('q_exams')) || [];
    let logs = JSON.parse(localStorage.getItem('q_logs')) || [];
    let scores = JSON.parse(localStorage.getItem('q_scores')) || [120, 150, 140, 180, 210];
    let weekTags = JSON.parse(localStorage.getItem('q_week')) || Array(7).fill().map(() => []);

    let pcmChart, sessionChart, scoreChart;

    // --- Stopwatch Logic ---
    let swInterval, swStart;
    function startSW() { swStart = Date.now() - (window.swElapsed || 0); swInterval = setInterval(updateSW, 100); }
    function stopSW() { clearInterval(swInterval); }
    function resetSW() { stopSW(); window.swElapsed = 0; document.getElementById('swDisplay').innerText = "00:00:00"; }
    function updateSW() {
        window.swElapsed = Date.now() - swStart;
        let s = Math.floor(window.swElapsed / 1000);
        let m = Math.floor(s / 60);
        let h = Math.floor(m / 60);
        document.getElementById('swDisplay').innerText = 
            `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    // --- Charts Logic ---
    function initCharts() {
        pcmChart = new Chart(document.getElementById('pcmChart'), {
            type: 'doughnut',
            data: { labels: ['Phy','Chem','Math'], datasets: [{ data: Object.values(studyData), backgroundColor: ['#3b82f6','#10b981','#f43f5e'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        sessionChart = new Chart(document.getElementById('sessionChart'), {
            type: 'line',
            data: { labels: logs.slice(-5).map(l => l.date), datasets: [{ label: 'Hrs', data: logs.slice(-5).map(l => l.hr), borderColor: varColor('--accent'), tension: 0.4 }] },
            options: { scales: { y: { display: false } } }
        });

        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'line',
            data: { labels: scores.map((_,i) => `Test ${i+1}`), datasets: [{ label: 'Score', data: scores, borderColor: varColor('--math'), fill: true, backgroundColor: 'rgba(244, 63, 94, 0.1)' }] },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function varColor(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

    // --- Core Functions ---
    function logSession() {
        let sub = document.getElementById('subSelect').value;
        let hr = parseFloat(document.getElementById('hrInput').value);
        if(!hr) return;
        studyData[sub] += hr;
        logs.push({ sub, hr, date: new Date().toLocaleDateString() });
        saveAll();
        location.reload(); 
    }

    function addScore() {
        let s = parseInt(document.getElementById('mockScore').value);
        if(s) { scores.push(s); saveAll(); location.reload(); }
    }

    function addExam() {
        let name = document.getElementById('exName').value;
        let date = document.getElementById('exDate').value;
        if(name && date) { exams.push({name, date}); saveAll(); renderExams(); }
    }

    function renderExams() {
        document.getElementById('examList').innerHTML = exams.map((ex, i) => {
            let d = Math.ceil((new Date(ex.date) - new Date()) / 86400000);
            return `<div class="exam-item"><strong>${d} Days</strong><br><small>${ex.name}</small></div>`;
        }).join('');
    }

    function renderWeek() {
        let days = ['M','T','W','T','F','S','S'];
        document.getElementById('weekContainer').innerHTML = days.map((d, i) => `
            <div class="day-box">
                <div style="font-size:10px; color:var(--accent); text-align:center">${d}</div>
                <div id="tags-${i}">${weekTags[i].map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <input type="text" placeholder="+" onkeydown="if(event.key==='Enter'){weekTags[${i}].push(this.value); saveAll(); location.reload();}" style="font-size:10px; padding:2px;">
            </div>
        `).join('');
    }

    function saveAll() {
        localStorage.setItem('q_data', JSON.stringify(studyData));
        localStorage.setItem('q_exams', JSON.stringify(exams));
        localStorage.setItem('q_logs', JSON.stringify(logs));
        localStorage.setItem('q_scores', JSON.stringify(scores));
        localStorage.setItem('q_week', JSON.stringify(weekTags));
    }

    function loadImg(e) {
        let reader = new FileReader();
        reader.onload = () => { document.getElementById('userPfp').src = reader.result; localStorage.setItem('q_pfp', reader.result); };
        reader.readAsDataURL(e.target.files[0]);
    }

    window.onload = () => {
        if(localStorage.getItem('q_pfp')) document.getElementById('userPfp').src = localStorage.getItem('q_pfp');
        initCharts();
        renderExams();
        renderWeek();
        document.getElementById('logList').innerHTML = logs.slice().reverse().map(l => `<div class="log-entry"><b>${l.sub}</b>: ${l.hr}h <span style="float:right">${l.date}</span></div>`).join('');
    };
</script>
</body>
</html>
