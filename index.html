<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Elite Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --card-bg: #161b2b;
            --accent: #00d2ff;
            --physics: #3b82f6;
            --chem: #10b981;
            --math: #f43f5e;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Profile Header */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .pfp-container {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            overflow: hidden;
            cursor: pointer;
            background: #1e293b;
        }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Exam Grid - Additive */
        .section-header { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .exam-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #2d3748;
            position: relative;
        }
        .exam-card .days { font-size: 2.5rem; font-weight: 800; display: block; margin: 10px 0; color: var(--accent); }
        .delete-exam { position: absolute; top: 10px; right: 10px; cursor: pointer; color: var(--text-dim); }

        /* Syllabus & Activity Grid */
        .main-stats { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
        .glass-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #2d3748; }

        /* Weekly Layout - 7 Columns like the Image */
        .weekly-scroll { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 15px; 
            margin-bottom: 40px;
        }
        .day-card {
            background: rgba(22, 27, 43, 0.6);
            border: 1px solid #2d3748;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            min-height: 200px;
        }
        .day-title { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #2d3748; padding-bottom: 5px;}
        
        /* Inputs */
        input, select { 
            background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 12px; border-radius: 10px; margin-bottom: 10px; width: 100%;
        }
        .btn-glow {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none; color: white; padding: 12px; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-glow:hover { box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .tag-item {
            background: #1e293b; color: var(--accent); font-size: 0.7rem; 
            padding: 5px 10px; border-radius: 5px; margin: 5px 0; display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-section">
        <div class="pfp-container" onclick="document.getElementById('pfpInput').click()">
            <img id="pfp" src="https://via.placeholder.com/100" alt="Your Photo">
        </div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="uploadPFP(event)">
        <div>
            <h1 style="margin:0">Welcome back, IITian</h1>
            <p style="color: var(--text-dim); margin: 5px 0;">Track your JEE Main & Advanced targets</p>
        </div>
    </div>

    <div class="section-header">
        <span>Upcoming Exams</span>
        <div style="display:flex; gap:10px;">
            <input type="text" id="exName" placeholder="Exam" style="width:150px; margin:0">
            <input type="date" id="exDate" style="width:150px; margin:0">
            <button class="btn-glow" onclick="addExam()" style="width:80px;">Add</button>
        </div>
    </div>
    <div id="examGrid" class="exam-grid"></div>

    <div class="main-stats">
        <div class="glass-card">
            <h2>📊 Syllabus Coverage</h2>
            <div style="display: flex; align-items: center; gap: 30px;">
                <div style="width: 200px;">
                    <canvas id="jeeChart"></canvas>
                </div>
                <div style="flex: 1;">
                    <select id="subSelect">
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Math">Mathematics</option>
                    </select>
                    <input type="number" id="hrsIn" placeholder="Enter Hours">
                    <button class="btn-glow" onclick="logData()">Log Study Session</button>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h2>📔 Quick Revision Notes</h2>
            <textarea id="jeeNotes" style="width:100%; height:150px; background:transparent; color:white; border:1px solid #334155; border-radius:10px; padding:10px;" oninput="saveNotes()" placeholder="Important formulas..."></textarea>
        </div>
    </div>

    <div class="section-header">Weekly Strategy Plan</div>
    <div class="weekly-scroll" id="weekGrid"></div>

</div>

<script>
    let exams = JSON.parse(localStorage.getItem('jee_exams')) || [];
    let studyData = JSON.parse(localStorage.getItem('jee_pcm_data')) || { Physics: 0, Chemistry: 0, Math: 0 };
    let chart;

    // --- Profile Pic ---
    function uploadPFP(e) {
        const reader = new FileReader();
        reader.onload = () => {
            document.getElementById('pfp').src = reader.result;
            localStorage.setItem('jee_pfp', reader.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    // --- Exams Logic ---
    function addExam() {
        const name = document.getElementById('exName').value;
        const date = document.getElementById('exDate').value;
        if(name && date) {
            exams.push({name, date});
            localStorage.setItem('jee_exams', JSON.stringify(exams));
            renderExams();
        }
    }

    function renderExams() {
        const grid = document.getElementById('examGrid');
        grid.innerHTML = '';
        exams.forEach((ex, i) => {
            const days = Math.ceil((new Date(ex.date) - new Date()) / (1000 * 60 * 60 * 24));
            grid.innerHTML += `
                <div class="exam-card">
                    <span class="delete-exam" onclick="removeExam(${i})">✕</span>
                    <span style="color:var(--text-dim); font-size:0.8rem">${ex.name}</span>
                    <span class="days">${days > 0 ? days : 0}</span>
                    <span style="font-size:0.7rem; color:var(--accent)">DAYS LEFT</span>
                </div>`;
        });
    }

    function removeExam(i) {
        exams.splice(i, 1);
        localStorage.setItem('jee_exams', JSON.stringify(exams));
        renderExams();
    }

    // --- Weekly Grid Logic (7 Columns) ---
    function renderWeek() {
        const weekGrid = document.getElementById('weekGrid');
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        weekGrid.innerHTML = days.map(d => `
            <div class="day-card">
                <div class="day-title">${d}</div>
                <div class="tag-item">Physics Chp 3 ✅</div>
                <div class="tag-item">Math Mock Test</div>
                <div class="tag-item">Inorganic Rev</div>
            </div>
        `).join('');
    }

    // --- Chart Logic ---
    function logData() {
        const sub = document.getElementById('subSelect').value;
        const hr = parseFloat(document.getElementById('hrsIn').value);
        if(sub && hr) {
            studyData[sub] += hr;
            localStorage.setItem('jee_pcm_data', JSON.stringify(studyData));
            updateChart();
        }
    }

    function updateChart() {
        const ctx = document.getElementById('jeeChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Physics', 'Chemistry', 'Math'],
                datasets: [{
                    data: [studyData.Physics, studyData.Chemistry, studyData.Math],
                    backgroundColor: ['#3b82f6', '#10b981', '#f43f5e'],
                    borderWidth: 0,
                    cutout: '80%'
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function saveNotes() {
        localStorage.setItem('jee_notes', document.getElementById('jeeNotes').value);
    }

    window.onload = () => {
        if(localStorage.getItem('jee_pfp')) document.getElementById('pfp').src = localStorage.getItem('jee_pfp');
        document.getElementById('jeeNotes').value = localStorage.getItem('jee_notes') || "";
        renderExams();
        renderWeek();
        updateChart();
    };
</script>

</body>
</html>
