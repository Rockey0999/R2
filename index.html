<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 20px; color: #1e293b; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.2rem; }
        input, textarea, button { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        #countdown { font-size: 1.5rem; font-weight: bold; text-align: center; color: #e11d48; }
        .log-entry { font-size: 0.85rem; border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>⏳ Exam Countdown</h2>
        <input type="date" id="examDate" onchange="updateCountdown()">
        <div id="countdown">Set a date!</div>
    </div>

    <div class="card">
        <h2>📝 Study Log</h2>
        <input type="text" id="subject" placeholder="Subject (e.g., Physics)">
        <input type="number" id="hours" placeholder="Hours studied">
        <button onclick="logStudy()">Log Session</button>
        <div id="logHistory" style="max-height: 150px; overflow-y: auto;"></div>
    </div>

    <div class="card">
        <h2>📊 Topic Distribution</h2>
        <canvas id="prepChart"></canvas>
    </div>

    <div class="card">
        <h2>📒 Revision Notes</h2>
        <textarea id="notesArea" rows="8" placeholder="Quick formulas or reminders..." oninput="saveNotes()"></textarea>
    </div>
</div>

<script>
    let studyData = JSON.parse(localStorage.getItem('studyData')) || {};
    let chart;

    // --- Countdown Logic ---
    function updateCountdown() {
        const target = new Date(document.getElementById('examDate').value);
        localStorage.setItem('examDate', target);
        
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) { clearInterval(timer); document.getElementById('countdown').innerHTML = "EXAM DAY!"; return; }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('countdown').innerHTML = `${days}d ${hours}h left`;
        }, 1000);
    }

    // --- Chart & Logging Logic ---
    function logStudy() {
        const sub = document.getElementById('subject').value;
        const hr = parseFloat(document.getElementById('hours').value);
        
        if (sub && hr) {
            studyData[sub] = (studyData[sub] || 0) + hr;
            localStorage.setItem('studyData', JSON.stringify(studyData));
            updateChart();
            addLogToUI(sub, hr);
        }
    }

    function updateChart() {
        const ctx = document.getElementById('prepChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(studyData),
                datasets: [{
                    data: Object.values(studyData),
                    backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6']
                }]
            }
        });
    }

    function addLogToUI(sub, hr) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<strong>${sub}</strong>: ${hr} hrs - ${new Date().toLocaleDateString()}`;
        document.getElementById('logHistory').prepend(div);
    }

    function saveNotes() {
        localStorage.setItem('prepNotes', document.getElementById('notesArea').value);
    }

    // Initialization
    window.onload = () => {
        if(localStorage.getItem('examDate')) {
            document.getElementById('examDate').value = new Date(localStorage.getItem('examDate')).toISOString().split('T')[0];
            updateCountdown();
        }
        document.getElementById('notesArea').value = localStorage.getItem('prepNotes') || "";
        updateChart();
    };
</script>

</body>
</html>
