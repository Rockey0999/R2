<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusDeck | Personal Study Dashboard</title>
    
    <!-- External Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        /* Layout Grid */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            grid-template-areas: 
                "header header header"
                "timer exam stats"
                "form chart logs";
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr 1fr; }
            .logs { grid-column: span 2; }
        }
        @media (max-width: 768px) {
            .container { display: flex; flex-direction: column; }
        }

        /* Components */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        h3 { font-size: 2rem; margin: 10px 0; }
        
        .header { grid-area: header; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer-area { grid-area: timer; }
        .exam-area { grid-area: exam; }
        .stats-area { grid-area: stats; }
        .form-area { grid-area: form; }
        .chart-area { grid-area: chart; }
        .logs-area { grid-area: logs; }

        /* Buttons & Inputs */
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        button.danger { background: var(--danger); }
        button.outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        
        input, select, textarea {
            background: #0f172a;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 10px;
        }
        input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

        /* Specific Styles */
        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            text-align: center;
            margin: 20px 0;
            color: var(--success);
        }
        
        .timer-controls { display: flex; gap: 10px; justify-content: center; }

        .exam-date-input { display: flex; gap: 10px; align-items: center; margin-top: auto; }
        
        .tag-pill {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        /* Table */
        .log-table-container { overflow-x: auto; max-height: 300px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card-bg); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Notes */
        .notes-area { flex-grow: 1; }
        textarea.notes { resize: none; height: 100%; min-height: 150px; }

    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> FocusDeck</h1>
        <button onclick="clearData()" class="danger outline" title="Reset All Data"><i class="fas fa-trash"></i> Reset</button>
    </div>

    <!-- 1. Active Timer -->
    <div class="card timer-area">
        <h2>Active Timer</h2>
        <div class="timer-display" id="activeTimer">00:00:00</div>
        <div class="timer-controls">
            <button onclick="startTimer()" id="startBtn"><i class="fas fa-play"></i> Start</button>
            <button onclick="stopTimer()" id="stopBtn" class="outline" disabled><i class="fas fa-pause"></i> Stop</button>
            <button onclick="resetTimer()" class="danger outline"><i class="fas fa-redo"></i> Reset</button>
        </div>
    </div>

    <!-- 2. Exam Countdown -->
    <div class="card exam-area">
        <h2>Exam Countdown</h2>
        <div id="examDisplay">
            <h3 id="daysLeft">0</h3>
            <p>Days Remaining</p>
            <p id="examNameDisplay" style="color: var(--text-muted); font-size: 0.9rem;">No Exam Set</p>
        </div>
        <div class="exam-date-input">
            <input type="text" id="examName" placeholder="Exam Name (e.g. Final Math)">
            <input type="date" id="examDate">
            <button onclick="setExam()">Set</button>
        </div>
    </div>

    <!-- 3. Stats (Quick) -->
    <div class="card stats-area">
        <h2>Quick Stats</h2>
        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
            <div>
                <p class="text-muted">Total Hours</p>
                <h3 id="totalHours">0</h3>
            </div>
            <div>
                <p class="text-muted">Sessions</p>
                <h3 id="totalSessions">0</h3>
            </div>
        </div>
    </div>

    <!-- 4. Log Session Form -->
    <div class="card form-area">
        <h2>Log Session</h2>
        <form id="logForm" onsubmit="addLog(event)">
            <label>Subject / Tag</label>
            <input type="text" id="tagInput" list="tagsList" placeholder="e.g. Math, Coding, History" required>
            <datalist id="tagsList"></datalist>

            <label>Duration (Minutes)</label>
            <input type="number" id="durationInput" placeholder="Minutes" required>

            <label>Date</label>
            <input type="date" id="dateInput" required>

            <label>Notes (Optional)</label>
            <input type="text" id="notesInput" placeholder="What did you learn?">

            <button type="submit" style="width: 100%; margin-top: 10px;">Save Session</button>
        </form>
    </div>

    <!-- 5. Charts -->
    <div class="card chart-area">
        <h2>Analytics</h2>
        <div style="height: 200px; position: relative;">
            <canvas id="studyChart"></canvas>
        </div>
    </div>

    <!-- 6. Logs Table -->
    <div class="card logs-area">
        <h2>Recent Logs</h2>
        <div class="log-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Tag</th>
                        <th>Duration</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    <!-- Rows injected via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    let logs = JSON.parse(localStorage.getItem('studyLogs')) || [];
    let exam = JSON.parse(localStorage.getItem('studyExam')) || { name: '', date: null };
    
    // Timer Variables
    let timerInterval;
    let seconds = 0;
    let isRunning = false;

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        // Set default date to today
        document.getElementById('dateInput').valueAsDate = new Date();
        
        // Load Exam
        if(exam.date) {
            document.getElementById('examName').value = exam.name;
            document.getElementById('examDate').value = exam.date;
            updateExamCountdown();
        }

        // Load Tags Datalist
        updateTagsDatalist();
        
        // Render UI
        renderLogs();
        updateStats();
        initChart();
    });

    // --- Exam Timer Logic ---
    function setExam() {
        const name = document.getElementById('examName').value;
        const date = document.getElementById('examDate').value;
        
        if(!date) return alert("Please pick a date");

        exam = { name, date };
        localStorage.setItem('studyExam', JSON.stringify(exam));
        updateExamCountdown();
    }

    function updateExamCountdown() {
        if(!exam.date) return;
        
        const today = new Date();
        today.setHours(0,0,0,0);
        const target = new Date(exam.date);
        
        const diffTime = target - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        document.getElementById('daysLeft').innerText = diffDays;
        document.getElementById('examNameDisplay').innerText = exam.name || "Exam";
        
        if(diffDays < 0) document.getElementById('daysLeft').innerText = "Done";
