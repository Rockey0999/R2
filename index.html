<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit JEE | Professional Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1; --brand-glow: rgba(99, 102, 241, 0.2);
            --surface: #0f172a; --panel: #1e293b; --border: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --phy: #818cf8; --chem: #34d399; --math: #fb7185;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--surface); color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 280px; background: #0b1120; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 24px;
        }

        .profile-container { text-align: center; padding-bottom: 30px; border-bottom: 1px solid var(--border); }
        .pfp-wrapper {
            width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 24px;
            background: var(--panel); border: 2px solid var(--brand); overflow: hidden; cursor: pointer;
        }
        .pfp-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Dashboard Grid Layout */
        main { flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        
        .bento-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Widgets Styling */
        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stat-header h2 { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin: 0; }

        .stopwatch-display { font-size: 2.5rem; font-weight: 700; color: var(--brand); letter-spacing: -1px; margin: 15px 0; }
        
        /* 7-Day Planning Columns */
        .planner-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .day-col { background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 12px; padding: 12px; min-height: 150px; }
        .day-label { font-size: 11px; font-weight: 700; color: var(--brand); text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .tag {
            background: var(--border); font-size: 10px; padding: 4px 8px; border-radius: 6px;
            display: inline-block; margin: 2px; border: 1px solid transparent; transition: 0.2s;
        }
        .tag:hover { border-color: var(--brand); color: var(--brand); }

        /* Commercial Inputs */
        input, select {
            background: #0f172a; border: 1px solid var(--border); color: white;
            padding: 10px 14px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 12px; width: 100%;
        }
        .btn-primary {
            background: var(--brand); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s;
        }
        .btn-primary:hover { background: #4f46e5; box-shadow: 0 0 15px var(--brand-glow); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="profile-container">
            <div class="pfp-wrapper" onclick="document.getElementById('fileIn').click()">
                <img id="pfp" src="https://ui-avatars.com/api/?name=JEE+Pro&background=6366f1&color=fff">
            </div>
            <input type="file" id="fileIn" hidden onchange="uploadPhoto(event)">
            <div style="font-weight: 700; font-size: 1.1rem;">Elite Aspirant</div>
            <div style="color: var(--text-muted); font-size: 0.8rem;">Target: IIT Bombay 2026</div>
        </div>

        <div style="margin-top: 30px;">
            <div class="stat-header"><h2>TIMER</h2></div>
            <div class="stopwatch-display" id="swTime">00:00:00</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-primary" onclick="startTimer()" style="flex:2">Focus</button>
                <button class="btn-primary" onclick="stopTimer()" style="background:#ef4444; flex:1">■</button>
            </div>
        </div>

        <div style="margin-top: auto;">
            <h2>ADD DEADLINE</h2>
            <input type="text" id="exName" placeholder="Exam Name">
            <input type="date" id="exDate">
            <button class="btn-primary" onclick="addExam()">Pin Deadline</button>
        </div>
    </aside>

    <main>
        <div class="bento-grid">
            <div class="bento-card">
                <div class="stat-header"><h2>PCM DISTRIBUTION</h2></div>
                <div style="height: 180px;"><canvas id="doughnutChart"></canvas></div>
                <div style="margin-top: 20px;">
                    <select id="subSelect"><option>Physics</option><option>Chemistry</option><option>Math</option></select>
                    <input type="number" id="hrsIn" placeholder="Session Hours">
                    <button class="btn-primary" onclick="logStudy()">Add to Syllabus</button>
                </div>
            </div>

            <div class="bento-card" style="grid-column: span 2;">
                <div class="stat-header"><h2>MOCK TEST ANALYSIS</h2></div>
                <div style="height: 250px;"><canvas id="lineChart"></canvas></div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <input type="number" id="scoreIn" placeholder="Last Score (300)">
                    <button class="btn-primary" style="width: 150px" onclick="addScore()">Update</button>
                </div>
            </div>
        </div>

        <div class="bento-card">
            <div class="stat-header"><h2>7-DAY TARGET PLANNER</h2></div>
            <div class="planner-row" id="planner"></div>
        </div>

        <div id="deadlines" style="display: flex; gap: 15px; overflow-x: auto;"></div>
    </main>

    <script>
        // Storage Keys
        let data = JSON.parse(localStorage.getItem('p_data')) || { Physics: 0, Chemistry: 0, Math: 0 };
        let scores = JSON.parse(localStorage.getItem('p_scores')) || [140, 165, 155, 190, 210];
        let exams = JSON.parse(localStorage.getItem('p_exams')) || [];
        let planner = JSON.parse(localStorage.getItem('p_plan')) || Array(7).fill().map(() => []);

        let dChart, lChart;

        // --- Charts Implementation ---
        function initCharts() {
            const dCtx = document.getElementById('doughnutChart').getContext('2d');
            dChart = new Chart(dCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Phy', 'Chem', 'Math'],
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#818cf8', '#34d399', '#fb7185'],
                        borderWidth: 0, cutout: '82%'
                    }]
                },
                options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });

            const lCtx = document.getElementById('lineChart').getContext('2d');
            lChart = new Chart(lCtx, {
                type: 'line',
                data: {
                    labels: scores.map((_, i) => `Test ${i+1}`),
                    datasets: [{
                        label: 'AIR Projection',
                        data: scores,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 5
                    }]
                },
                options: {
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } },
                    maintainAspectRatio: false
                }
            });
        }

        // --- Core Logic ---
        function logStudy() {
            const sub = document.getElementById('subSelect').value;
            const hrs = parseFloat(document.getElementById('hrsIn').value);
            if(hrs) {
                data[sub] += hrs;
                localStorage.setItem('p_data', JSON.stringify(data));
                location.reload();
            }
        }

        function addScore() {
            const s = parseInt(document.getElementById('scoreIn').value);
            if(s) { scores.push(s); localStorage.setItem('p_scores', JSON.stringify(scores)); location.reload(); }
        }

        function addExam() {
            const n = document.getElementById('exName').value;
            const d = document.getElementById('exDate').value;
            if(n && d) { exams.push({n, d}); localStorage.setItem('p_exams', JSON.stringify(exams)); renderUI(); }
        }

        // --- UI Rendering ---
        function renderUI() {
            // Planner
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            document.getElementById('planner').innerHTML = days.map((day, i) => `
                <div class="day-col">
                    <span class="day-label">${day}</span>
                    <div id="tags-${i}">${planner[i].map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <input type="text" placeholder="+" onkeydown="if(event.key==='Enter'){planner[${i}].push(this.value); localStorage.setItem('p_plan', JSON.stringify(planner)); renderUI();}" 
                    style="font-size: 10px; margin-top: 10px; background: transparent; border: 1px dashed var(--border);">
                </div>
            `).join('');

            // Deadlines
            document.getElementById('deadlines').innerHTML = exams.map(ex => {
                const diff = Math.ceil((new Date(ex.d) - new Date()) / 86400000);
                return `
                    <div class="bento-card" style="min-width: 200px; padding: 15px;">
                        <div style="font-size: 0.7rem; color: var(--text-muted)">${ex.n}</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: var(--math)">${diff > 0 ? diff : 0} Days</div>
                    </div>
                `;
            }).join('');
        }

        // --- Timer Logic ---
        let startTime, timerInt;
        function startTimer() { startTime = Date.now(); timerInt = setInterval(() => {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('swTime').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000); }
        function stopTimer() { clearInterval(timerInt); }

        function uploadPhoto(e) {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('pfp').src = reader.result; localStorage.setItem('p_pfp', reader.result); };
            reader.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => {
            if(localStorage.getItem('p_pfp')) document.getElementById('pfp').src = localStorage.getItem('p_pfp');
            initCharts(); renderUI();
        };
    </script>
</body>
</html>
